<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox și Grid</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      padding:30px;
      background:#f4f4f4;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    h2{
      margin:30px 0 15px;
    }

    .flex-container{
      height:80vh;
      border:6px double black;
      display:flex;
      padding:20px;
      background:white;
    }

    .box{
      width:100px;
      height:100px;
      color:white;
      font-size:25px;
      font-weight:bold;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .box-1{
      background:crimson;
      align-self:flex-start;
    }
    .box-2{
      background:royalblue;
      margin:auto;
    }
    .box-3{
      background:seagreen;
      align-self:flex-end;
      margin-left:auto;
    }
    .grid-container{
      margin-top:40px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }
    .item{
      background:rgba(52, 152, 219, 0.7);
      color:white;
      font-size:24px;
      font-weight:bold;
      padding:50px;
      text-align:center;
    }
    .item-1{
      grid-column:1 / 3;
    }
  </style>
</head>
<body>
  <h1>Provocare Flexbox și Grid</h1>
  <h2>A. Provocarea Flexbox</h2>
  <div class="flex-container">
    <div class="box box-1">1</div>
    <div class="box box-2">2</div>
    <div class="box box-3">3</div>
  </div>
  <h2>B. Provocarea Grid</h2>
  <div class="grid-container">
    <div class="item item-1">Element 1</div>
    <div class="item">Element 2</div>
    <div class="item">Element 3</div>
    <div class="item">Element 4</div>
  </div>
</body>
</html>
